services:
  coral-back:
    build:
      context: .
      dockerfile: Dockerfile
    image: coral-back
    container_name: coral-back
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
      - ./app/services/prompted_segmentation/weights:/app/services/prompted_segmentation/weights
      - ./logs:/app/logs
    environment:
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:7000}
      - PROMPTED_SEGMENTATION_BACKEND_URL=${PROMPTED_SEGMENTATION_BACKEND_URL:-http://host.docker.internal:8001}
      - AUTOMATIC_SEGMENTATION_BACKEND_URL=${AUTOMATIC_SEGMENTATION_BACKEND_URL:-http://host.docker.internal:8002}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    command: uv run uvicorn main:app --host 0.0.0.0 --port 8000
    # Optional: Can use env_file to load from .env
    # env_file:
    #   - .env